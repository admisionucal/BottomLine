<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bottom Line - Lead Detail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #f5f7fa;
        }

        .header {
            background: white;
            padding: 12px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 10;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header h1 {
            font-size: 20px;
            color: #1a237e;
        }
        .header h1 span {
            color: #ff6f00;
        }
        .header .back {
            color: #1a237e;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
        }
        .header .back:hover {
            text-decoration: underline;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .user-badge {
            background: #e8eaf6;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: #1a237e;
            font-weight: 500;
        }
        .user-badge .rol {
            background: #1a237e;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            margin-left: 8px;
            font-size: 11px;
        }
        .user-badge .rol.admin {
            background: #ff6f00;
        }
        .btn-logout {
            background: none;
            border: none;
            color: #d32f2f;
            cursor: pointer;
            font-size: 14px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 32px;
        }

        .lead-header {
            background: white;
            padding: 18px 22px;
            border-radius: 10px;
            border: 1px solid #e8eaf6;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .lead-header .info h2 {
            font-size: 22px;
            color: #1a237e;
        }
        .lead-header .info .sub {
            color: #777;
            font-size: 14px;
            margin-top: 4px;
        }
        .lead-header .info .sub span {
            background: #e8eaf6;
            padding: 2px 12px;
            border-radius: 12px;
            margin-right: 8px;
        }
        .lead-header .info .sub .colegio-tag {
            background: #fff3e0;
            color: #e65100;
        }

        .status-large {
            padding: 8px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
        }
        .status-large.vp {
            background: #c8e6c9;
            color: #1b5e20;
        }
        .status-large.pp {
            background: #bbdefb;
            color: #0d47a1;
        }
        .status-large.pago {
            background: #ffecb3;
            color: #e65100;
        }
        .status-large.perdido {
            background: #ffcdd2;
            color: #b71c1c;
        }
        .status-large.vll {
            background: #ffe0b2;
            color: #bf360c;
        }
        .status-large.black {
            background: #212121;
            color: white;
        }

        .tabs {
            display: flex;
            gap: 4px;
            background: white;
            border-radius: 10px 10px 0 0;
            padding: 0 4px;
            border-bottom: 2px solid #e0e0e0;
            border-left: 1px solid #e8eaf6;
            border-right: 1px solid #e8eaf6;
            border-top: 1px solid #e8eaf6;
        }
        .tabs button {
            padding: 12px 24px;
            border: none;
            background: transparent;
            font-size: 14px;
            font-weight: 500;
            color: #777;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }
        .tabs button.active {
            color: #1a237e;
            border-bottom-color: #1a237e;
        }
        .tabs button:hover {
            color: #1a237e;
        }

        .tab-content {
            background: white;
            padding: 24px;
            border-radius: 0 0 10px 10px;
            border-left: 1px solid #e8eaf6;
            border-right: 1px solid #e8eaf6;
            border-bottom: 1px solid #e8eaf6;
            min-height: 300px;
        }

        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 32px;
        }
        .grid-2col .campo {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .grid-2col .campo label {
            font-size: 12px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .grid-2col .campo select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 15px;
            background: white;
            color: #1a1a1a;
            cursor: pointer;
            transition: border 0.3s;
        }
        .grid-2col .campo select:focus {
            outline: none;
            border-color: #1a237e;
        }
        .grid-2col .campo .value {
            font-size: 16px;
            color: #1a1a1a;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .grid-2col .campo .value.editable {
            background: #fafbff;
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            cursor: text;
        }
        .grid-2col .campo .value.editable:focus {
            outline: none;
            border-color: #1a237e;
        }
        .grid-2col .campo .value .badge {
            background: #e8f5e9;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 13px;
            color: #1b5e20;
        }

        .status-display {
            padding: 14px 18px;
            background: #f8f9fc;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 24px;
        }
        .status-display .label {
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }
        .status-display .badge {
            margin-left: 8px;
            font-size: 14px;
            padding: 6px 16px;
        }
        .status-display .fecha-pp {
            display: none;
        }
        .status-display .fecha-pp label {
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }
        .status-display .fecha-pp .value {
            font-size: 14px;
            color: #1a237e;
            font-weight: 500;
            margin-left: 6px;
        }
        .status-display .auto {
            font-size: 13px;
            color: #888;
            margin-left: auto;
        }

        .tipo-ingreso-selector {
            padding: 12px 16px;
            background: #e3f2fd;
            border-radius: 8px;
            border: 1px solid #90caf9;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 20px;
        }
        .tipo-ingreso-selector .label {
            font-weight: 600;
            font-size: 14px;
            color: #0d47a1;
        }
        .tipo-ingreso-selector select {
            padding: 6px 14px;
            border: 1px solid #90caf9;
            border-radius: 6px;
            font-size: 14px;
            background: white;
        }
        .tipo-ingreso-selector .nota {
            font-size: 13px;
            color: #555;
        }

        .aliado-badge {
            display: inline-block;
            background: #e8f5e9;
            color: #1b5e20;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 6px;
        }

        .precios-box {
            padding: 16px 20px;
            background: #e3f2fd;
            border-radius: 8px;
            border: 1px solid #90caf9;
            margin-top: 16px;
        }
        .precios-box .titulo {
            font-weight: 600;
            font-size: 14px;
            color: #0d47a1;
            margin-bottom: 8px;
        }
        .precios-box .row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px 32px;
            font-size: 14px;
            align-items: center;
        }
        .precios-box .row .item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .precios-box .row .item strong {
            color: #0d47a1;
        }
        .precios-box .row .item .valor {
            font-weight: 700;
            color: #1a237e;
        }
        .precios-box .row .item .descuento {
            background: #c8e6c9;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            color: #1b5e20;
        }
        .precios-box .total {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #90caf9;
            font-size: 16px;
            font-weight: 700;
            color: #1a237e;
        }
        .precios-box .total span {
            font-size: 20px;
        }

        .aprobacion-box {
            padding: 14px 18px;
            background: #fff8e1;
            border: 1px solid #ffecb3;
            border-radius: 8px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px 16px;
            margin-top: 16px;
        }
        .aprobacion-box .label {
            font-weight: 600;
            font-size: 14px;
            color: #e65100;
        }
        .aprobacion-box .estado {
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        .aprobacion-box .estado.pendiente {
            background: #fff3e0;
            color: #e65100;
        }
        .aprobacion-box .estado.aprobado {
            background: #e8f5e9;
            color: #1b5e20;
        }
        .aprobacion-box .estado.rechazado {
            background: #ffcdd2;
            color: #b71c1c;
        }

        .btn-solicitar {
            padding: 6px 20px;
            border: none;
            background: #1a237e;
            color: white;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-solicitar:hover {
            opacity: 0.8;
        }
        .btn-solicitar.rojo {
            background: #d32f2f;
        }
        .btn-guardar {
            padding: 10px 32px;
            background: #1a237e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
        .btn-guardar:hover {
            opacity: 0.8;
        }

        .vista2-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 32px;
        }
        .vista2-grid .campo {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .vista2-grid .campo label {
            font-size: 12px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .vista2-grid .campo .value {
            font-size: 15px;
            color: #1a1a1a;
            padding: 10px 12px;
            background: #fafbff;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            min-height: 44px;
            cursor: text;
        }
        .vista2-grid .campo .value:focus {
            outline: none;
            border-color: #1a237e;
        }
        .vista2-grid .campo-full {
            grid-column: 1 / -1;
        }

        .comentarios-section {
            margin-top: 24px;
            border-top: 1px solid #eee;
            padding-top: 18px;
        }
        .comentarios-section h4 {
            font-size: 14px;
            color: #555;
            margin-bottom: 12px;
        }
        .comentario-item {
            padding: 10px 16px;
            background: #f8f9fc;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .comentario-item .fecha {
            font-size: 12px;
            color: #888;
        }
        .comentario-item .autor {
            font-weight: 500;
            color: #1a237e;
            margin-right: 12px;
        }
        .comentario-nuevo {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .comentario-nuevo input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .comentario-nuevo input:focus {
            outline: none;
            border-color: #1a237e;
        }
        .comentario-nuevo button {
            padding: 10px 24px;
            background: #1a237e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .comentario-nuevo button:hover {
            opacity: 0.8;
        }

        .pagination-mini {
            margin-top: 16px;
            display: flex;
            gap: 6px;
            justify-content: flex-end;
        }
        .pagination-mini button {
            padding: 4px 14px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .pagination-mini button.active {
            background: #1a237e;
            color: white;
            border-color: #1a237e;
        }

        .table-historial {
            width: 100%;
            font-size: 13px;
            border-collapse: collapse;
        }
        .table-historial th {
            text-align: left;
            padding: 8px 12px;
            background: #f8f9fc;
            border-bottom: 2px solid #e8eaf6;
            font-size: 12px;
            text-transform: uppercase;
            color: #555;
            font-weight: 600;
        }
        .table-historial td {
            padding: 8px 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .table-historial tr:hover {
            background: #fafbff;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .campo-editable-select,
        .campo-editable-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #90caf9;
            background: #f3f8ff;
            border-radius: 6px;
            font-size: 14px;
            color: #1a1a1a;
            font-family: inherit;
        }
        .campo-editable-select:focus,
        .campo-editable-input:focus {
            outline: none;
            border-color: #1a237e;
            background: white;
        }

        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }
            .grid-2col {
                grid-template-columns: 1fr;
            }
            .vista2-grid {
                grid-template-columns: 1fr;
            }
            .vista2-grid .campo-full {
                grid-column: 1;
            }
            .lead-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .tabs button {
                padding: 10px 16px;
                font-size: 13px;
            }
            .status-display {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .status-display .auto {
                margin-left: 0;
            }
            .tipo-ingreso-selector {
                flex-direction: column;
                align-items: stretch;
            }
            .precios-box .row {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <div class="header">
        <a href="#" class="back" onclick="volver()">← Volver al Dashboard</a>
        <h1>Bottom <span>Line</span></h1>
        <div class="header-right">
            <span class="user-badge" id="userBadge">👤 Usuario <span class="rol" id="userRol">ADMIN</span></span>
            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <div class="container">

        <!-- ===== LEAD HEADER ===== -->
        <div class="lead-header" id="leadHeader">
            <div class="info">
                <h2 id="leadNombre">Cargando...</h2>
                <div class="sub" id="leadSub">
                    <span id="leadId">ID: ---</span>
                    <span id="leadCarrera">---</span>
                    <span id="leadIngreso">---</span>
                </div>
            </div>
            <div class="status-large vp" id="statusBadge">✅ VP Viva</div>
        </div>

        <!-- ===== TABS ===== -->
        <div class="tabs">
            <button class="active" data-tab="vista1">Datos</button>
            <button data-tab="vista2">Perfilamiento</button>
            <button data-tab="historial">Historial</button>
            <button data-tab="pagos">Pagos</button>
        </div>

        <!-- ===== TAB 1: VISTA 1 ===== -->
        <div class="tab-content" id="tab-vista1">
            <div id="vista1Content">
                <div class="loading">Cargando datos...</div>
            </div>
        </div>

        <!-- ===== TAB 2: VISTA 2 ===== -->
        <div class="tab-content" id="tab-vista2" style="display:none;">
            <div id="vista2Content">
                <div class="loading">Cargando datos...</div>
            </div>
        </div>

        <!-- ===== TAB 3: HISTORIAL ===== -->
        <div class="tab-content" id="tab-historial" style="display:none;">
            <div id="historialContent">
                <div class="loading">Cargando historial...</div>
            </div>
        </div>

        <!-- ===== TAB 4: PAGOS ===== -->
        <div id="tab-pagos" class="tab-content" style="display:none"></div>

    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/lead-detail.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', initLeadDetail);
    </script>

</body>
</html>
