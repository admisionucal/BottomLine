<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bottom Line - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        html, body {
            height: 100%;
        }
        body {
            background: #ffffff;
        }

        .split {
            display: flex;
            min-height: 100vh;
        }

        /* ===== PANEL IZQUIERDO — FORMULARIO ===== */
        .panel-form {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            padding: 40px;
        }

        .login-container {
            width: 100%;
            max-width: 380px;
        }

        .login-container h1 {
            color: #1a237e;
            margin-bottom: 8px;
            font-size: 32px;
        }
        .login-container h1 span {
            color: #ff6f00;
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #1a237e;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #1a237e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 4px;
        }
        .btn-login:hover {
            background: #0d1555;
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-msg {
            color: #d32f2f;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        /* ===== PANEL DERECHO — IMAGEN ===== */
        .panel-image {
            flex: 1.2;
            background: transparent url('assets/logo.png') center center / 500px auto no-repeat;
        }

        @media (max-width: 900px) {
            .panel-image {
                display: none;
            }
            .panel-form {
                padding: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="split">
        <div class="panel-form">
            <div class="login-container">
                <h1>Bottom <span>Line</span></h1>

                <form id="loginForm" onsubmit="return handleLogin(event)">
                    <div class="form-group">
                        <label>Usuario</label>
                        <input type="text" id="usuario" placeholder="Ingrese su usuario" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-login" id="loginBtn">Ingresar</button>
                    <div class="error-msg" id="errorMsg">Credenciales incorrectas</div>
                </form>
            </div>
        </div>

        <div class="panel-image"></div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // ===== MANEJAR LOGIN =====
        async function handleLogin(e) {
            e.preventDefault();
            const usuario = document.getElementById('usuario').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.textContent = 'Verificando...';
            errorMsg.style.display = 'none';

            try {
                const result = await login(usuario, password);

                if (result.success) {
                    setUser(result.user);
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.textContent = result.error || 'Credenciales incorrectas';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.textContent = 'Error de conexión: ' + error.message;
                errorMsg.style.display = 'block';
            }

            btn.disabled = false;
            btn.textContent = 'Ingresar';
        }

        // ===== VERIFICAR SESIÓN =====
        (function checkSession() {
            const user = getCurrentUser();
            if (user) {
                window.location.href = 'dashboard.html';
            }
        })();
    </script>
</body>
</html>
